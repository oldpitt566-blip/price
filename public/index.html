<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 概念股即時監控面板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pulse {
            animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .3; }
        }
        .stock-card {
            transition: all 0.2s ease-in-out;
        }
        .stock-card:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8 font-sans">
    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="mb-10 flex flex-col md:flex-row md:items-end justify-between gap-4">
            <div>
                <h1 class="text-4xl font-black text-slate-800 tracking-tight">AI 概念股即時監控</h1>
                <p class="text-slate-500 mt-2 font-medium">每秒更新 | 資料來源：Yahoo Finance API</p>
            </div>
            <div class="flex items-center space-x-6 bg-white px-6 py-3 rounded-2xl shadow-sm border border-slate-200">
                <div class="flex items-center space-x-2">
                    <span class="text-sm font-bold text-slate-400 uppercase tracking-wider">Server Status</span>
                    <div id="global-status" class="w-3 h-3 rounded-full bg-green-500 pulse"></div>
                </div>
                <div class="h-4 w-px bg-slate-200"></div>
                <div class="text-sm font-bold text-slate-600 font-mono" id="current-time">--:--:--</div>
            </div>
        </header>

        <!-- Categories Section -->
        <div class="space-y-12" id="category-container">
            <!-- Categories will be injected here -->
        </div>

        <footer class="mt-16 py-8 border-t border-slate-200 text-center text-slate-400 text-sm">
            <p>© 2026 AI Stock Monitor - 僅供參考，不構成投資建議。</p>
            <p class="mt-1">系統最後同步時間: <span id="last-sync" class="font-mono">--:--:--</span></p>
        </footer>
    </div>

    <!-- Template for Category -->
    <template id="category-template">
        <section class="category-section">
            <div class="flex items-center space-x-3 mb-6">
                <div class="h-8 w-1.5 bg-indigo-600 rounded-full"></div>
                <h2 class="text-2xl font-bold text-slate-800 category-title">類別名稱</h2>
                <span class="text-slate-400 text-sm font-medium category-desc">類別描述</span>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 stock-grid">
                <!-- Stock cards will be injected here -->
            </div>
        </section>
    </template>

    <!-- Template for Stock Card -->
    <template id="stock-card-template">
        <div class="stock-card bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex flex-col justify-between">
            <div class="flex justify-between items-start mb-3">
                <div>
                    <h3 class="font-bold text-slate-800 stock-name text-lg">---</h3>
                    <p class="text-xs font-bold text-slate-400 stock-id font-mono">----</p>
                </div>
                <div class="update-pulse w-2 h-2 rounded-full bg-slate-100"></div>
            </div>
            
            <div class="my-2">
                <div class="flex items-baseline space-x-1">
                    <span class="stock-price text-3xl font-black text-slate-900 leading-none">---.--</span>
                    <span class="text-[10px] font-bold text-slate-400 uppercase">TWD</span>
                </div>
            </div>

            <div class="change-container flex items-center space-x-2 text-sm font-bold mt-2">
                <span class="change-arrow"></span>
                <span class="change-value">--.--</span>
                <span class="change-percent">(--.--)%</span>
            </div>

            <div class="mt-4 pt-3 border-t border-slate-50 flex justify-between items-center text-[10px]">
                <span class="text-slate-300 font-bold uppercase">Market Time</span>
                <span class="stock-time text-slate-400 font-mono font-bold">--:--:--</span>
            </div>
        </div>
    </template>

    <script>
        const categories = [
            {
                title: "AI 的大腦與起點",
                desc: "晶片與代工",
                stocks: [
                    { id: '2330', name: '台積電' },
                    { id: '2454', name: '聯發科' }
                ]
            },
            {
                title: "散熱模組 (關鍵)",
                desc: "液冷、水冷、風扇",
                stocks: [
                    { id: '3017', name: '奇鋐' },
                    { id: '3324', name: '雙鴻' },
                    { id: '6805', name: '富世達' },
                    { id: '2421', name: '建準' }
                ]
            },
            {
                title: "機殼與滑軌",
                desc: "伺服器機構件",
                stocks: [
                    { id: '8210', name: '勤誠' },
                    { id: '6117', name: '迎廣' },
                    { id: '2059', name: '川湖' },
                    { id: '6417', name: '南俊國際' }
                ]
            },
            {
                title: "PCB 與 CCL",
                desc: "高層板與 ABF 載板",
                stocks: [
                    { id: '2383', name: '台光電' },
                    { id: '2368', name: '金像電' },
                    { id: '3037', name: '欣興' },
                    { id: '8046', name: '南電' }
                ]
            },
            {
                title: "組裝與 ODM",
                desc: "系統整合與代工",
                stocks: [
                    { id: '2317', name: '鴻海' },
                    { id: '2382', name: '廣達' },
                    { id: '3231', name: '緯創' },
                    { id: '6669', name: '緯穎' }
                ]
            }
        ];

        const categoryContainer = document.getElementById('category-container');
        const categoryTemplate = document.getElementById('category-template');
        const stockTemplate = document.getElementById('stock-card-template');
        const globalStatus = document.getElementById('global-status');
        const lastSyncEl = document.getElementById('last-sync');
        const currentTimeEl = document.getElementById('current-time');

        const stockRefs = {};

        // Build UI
        categories.forEach(cat => {
            const catClone = categoryTemplate.content.cloneNode(true);
            catClone.querySelector('.category-title').textContent = cat.title;
            catClone.querySelector('.category-desc').textContent = cat.desc;
            
            const grid = catClone.querySelector('.stock-grid');
            
            cat.stocks.forEach(stock => {
                const stockClone = stockTemplate.content.cloneNode(true);
                const card = stockClone.querySelector('.stock-card');
                
                card.querySelector('.stock-name').textContent = stock.name;
                card.querySelector('.stock-id').textContent = `${stock.id}.TW`;
                
                grid.appendChild(stockClone);
                
                const element = grid.lastElementChild;
                stockRefs[stock.id] = {
                    price: element.querySelector('.stock-price'),
                    changeValue: element.querySelector('.change-value'),
                    changePercent: element.querySelector('.change-percent'),
                    changeArrow: element.querySelector('.change-arrow'),
                    changeContainer: element.querySelector('.change-container'),
                    time: element.querySelector('.stock-time'),
                    pulse: element.querySelector('.update-pulse')
                };
            });
            
            categoryContainer.appendChild(catClone);
        });

        async function fetchStock(id) {
            const ref = stockRefs[id];
            try {
                const res = await fetch(`/api/stock/${id}`);
                if (!res.ok) throw new Error();
                const data = await res.json();

                ref.price.textContent = data.price;
                ref.changeValue.textContent = Math.abs(data.change).toFixed(2);
                ref.changePercent.textContent = `(${data.changePercent}%)`;
                
                const val = parseFloat(data.change);
                if (val > 0) {
                    ref.changeContainer.className = 'change-container flex items-center space-x-2 text-sm font-bold mt-2 text-red-600';
                    ref.changeArrow.textContent = '▲';
                } else if (val < 0) {
                    ref.changeContainer.className = 'change-container flex items-center space-x-2 text-sm font-bold mt-2 text-green-600';
                    ref.changeArrow.textContent = '▼';
                } else {
                    ref.changeContainer.className = 'change-container flex items-center space-x-2 text-sm font-bold mt-2 text-slate-400';
                    ref.changeArrow.textContent = '';
                }

                ref.time.textContent = new Date(data.timestamp).toLocaleTimeString('zh-TW', { hour12: false });
                
                // Visual Pulse
                ref.pulse.classList.replace('bg-slate-100', 'bg-indigo-400');
                setTimeout(() => ref.pulse.classList.replace('bg-indigo-400', 'bg-slate-100'), 300);
                
                return true;
            } catch (e) {
                return false;
            }
        }

        async function updateAll() {
            const ids = Object.keys(stockRefs);
            const results = await Promise.all(ids.map(id => fetchStock(id)));
            
            const anyError = results.includes(false);
            globalStatus.className = `w-3 h-3 rounded-full pulse ${anyError ? 'bg-amber-500' : 'bg-green-500'}`;
            
            const now = new Date();
            lastSyncEl.textContent = now.toLocaleTimeString('zh-TW', { hour12: false });
            currentTimeEl.textContent = now.toLocaleTimeString('zh-TW', { hour12: false });
        }

        updateAll();
        setInterval(updateAll, 1000);
    </script>
</body>
</html>
