<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股即時監控</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pulse {
            animation: pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8 font-sans">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8 bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
            <div>
                <h1 class="text-3xl font-bold text-gray-800">台股即時監控</h1>
                <p class="text-gray-500 mt-1">即時更新 (每秒) | 數據來源: Yahoo Finance</p>
            </div>
            <div class="flex items-center space-x-2">
                <span class="text-sm font-medium text-gray-600">連線狀態:</span>
                <div id="global-status" class="w-3 h-3 rounded-full bg-green-500 pulse"></div>
            </div>
        </header>

        <div id="stock-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Stock cards will be injected here -->
        </div>

        <footer class="mt-12 text-center text-gray-400 text-sm">
            最後檢查時間: <span id="last-check" class="font-mono">--:--:--</span>
        </footer>
    </div>

    <template id="stock-card-template">
        <div class="bg-white p-6 rounded-2xl shadow-md border border-gray-100 transition-all hover:shadow-lg">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <h2 class="text-xl font-bold text-gray-800 stock-name">---</h2>
                    <p class="text-sm text-gray-400 stock-id font-mono">----</p>
                </div>
                <div class="update-indicator w-2 h-2 rounded-full bg-gray-200"></div>
            </div>
            
            <div class="mb-4">
                <div class="flex items-baseline space-x-1">
                    <span class="stock-price text-4xl font-extrabold text-gray-900">---.--</span>
                    <span class="text-xs font-medium text-gray-400">TWD</span>
                </div>
            </div>

            <div class="change-container flex items-center space-x-2 text-lg font-semibold">
                <span class="change-arrow"></span>
                <span class="change-value">--.--</span>
                <span class="change-percent">(--.--)%</span>
            </div>

            <div class="mt-4 pt-4 border-t border-gray-50 flex justify-between items-center">
                <span class="text-[10px] text-gray-400 uppercase tracking-wider">Market Time</span>
                <span class="stock-time text-xs text-gray-500 font-mono">--:--:--</span>
            </div>
        </div>
    </template>

    <script>
        const stockIds = ['2330', '2603', '2317', '2606', '2605'];
        const stockNames = {
            '2330': '台積電',
            '2603': '長榮',
            '2317': '鴻海',
            '2606': '裕民',
            '2605': '新興'
        };

        const grid = document.getElementById('stock-grid');
        const template = document.getElementById('stock-card-template');
        const globalStatus = document.getElementById('global-status');
        const lastCheckEl = document.getElementById('last-check');

        const stockCards = {};

        // Initialize cards
        stockIds.forEach(id => {
            const clone = template.content.cloneNode(true);
            const card = clone.querySelector('div');
            
            card.querySelector('.stock-name').textContent = stockNames[id] || '股票';
            card.querySelector('.stock-id').textContent = `${id}.TW`;
            
            grid.appendChild(clone);
            
            // Re-find elements in the appended DOM
            const newCard = grid.lastElementChild;
            stockCards[id] = {
                price: newCard.querySelector('.stock-price'),
                changeValue: newCard.querySelector('.change-value'),
                changePercent: newCard.querySelector('.change-percent'),
                changeArrow: newCard.querySelector('.change-arrow'),
                changeContainer: newCard.querySelector('.change-container'),
                time: newCard.querySelector('.stock-time'),
                indicator: newCard.querySelector('.update-indicator')
            };
        });

        async function updateStock(id) {
            const card = stockCards[id];
            try {
                const response = await fetch(`/api/stock/${id}`);
                if (!response.ok) throw new Error('API Error');
                const data = await response.json();

                // Update data
                card.price.textContent = data.price;
                card.changeValue.textContent = Math.abs(data.change).toFixed(2);
                card.changePercent.textContent = `(${data.changePercent}%)`;
                
                const isUp = parseFloat(data.change) > 0;
                const isDown = parseFloat(data.change) < 0;

                if (isUp) {
                    card.changeContainer.className = 'change-container flex items-center space-x-2 text-lg font-semibold text-red-600';
                    card.changeArrow.textContent = '▲';
                } else if (isDown) {
                    card.changeContainer.className = 'change-container flex items-center space-x-2 text-lg font-semibold text-green-600';
                    card.changeArrow.textContent = '▼';
                } else {
                    card.changeContainer.className = 'change-container flex items-center space-x-2 text-lg font-semibold text-gray-500';
                    card.changeArrow.textContent = '';
                }

                const time = new Date(data.timestamp).toLocaleTimeString('zh-TW', { hour12: false });
                card.time.textContent = time;

                // Visual feedback for update
                card.indicator.classList.remove('bg-gray-200');
                card.indicator.classList.add('bg-blue-400');
                setTimeout(() => {
                    card.indicator.classList.remove('bg-blue-400');
                    card.indicator.classList.add('bg-gray-200');
                }, 200);

                return true;
            } catch (err) {
                console.error(`Failed to fetch ${id}:`, err);
                return false;
            }
        }

        async function updateAll() {
            const results = await Promise.all(stockIds.map(id => updateStock(id)));
            const allOk = results.every(r => r === true);
            
            globalStatus.className = `w-3 h-3 rounded-full pulse ${allOk ? 'bg-green-500' : 'bg-red-500'}`;
            lastCheckEl.textContent = new Date().toLocaleTimeString('zh-TW', { hour12: false });
        }

        // Run
        updateAll();
        setInterval(updateAll, 1000);
    </script>
</body>
</html>
